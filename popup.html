<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Hide</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <h1 class="title">YouTube Hide</h1>
      <p class="subtitle">Hide streamed videos, Shorts, and more</p>
      <label class="toggle" for="streamed-toggle">
        <span class="toggle-label">Hide streamed videos</span>
        <input id="streamed-toggle" type="checkbox" checked />
        <span class="switch" aria-hidden="true"></span>
      </label>
      <label class="toggle" for="shorts-toggle">
        <span class="toggle-label">Hide Shorts</span>
        <input id="shorts-toggle" type="checkbox" checked />
        <span class="switch" aria-hidden="true"></span>
      </label>
      <label class="toggle" for="mix-toggle">
        <span class="toggle-label">Hide playlist Mixes</span>
        <input id="mix-toggle" type="checkbox" checked />
        <span class="switch" aria-hidden="true"></span>
      </label>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
